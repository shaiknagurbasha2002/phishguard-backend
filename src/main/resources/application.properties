spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/phishguard_db}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=${PORT:8081}

# Serialize LocalDateTime as ISO string instead of array
spring.jackson.serialization.write-dates-as-timestamps=false

# File upload settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# Upload directory (relative to project root)
app.upload.dir=uploads

# Base URL for file download links
app.base-url=${APP_BASE_URL:http://localhost:8081}

# CORS allowed frontend origins (comma-separated)
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
