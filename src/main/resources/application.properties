# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/phishguard_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Connection Pool (Clever Cloud free tier: max 5 connections) ───────────────
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8081}

# ── Email ─────────────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:bnagur157@gmail.com}
spring.mail.password=${MAIL_PASSWORD:jxlf ihuf zjxc xcvv}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── App URLs ──────────────────────────────────────────────────────────────────
app.base-url=${APP_BASE_URL:http://localhost:8081}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:3000}

# ── File Upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
